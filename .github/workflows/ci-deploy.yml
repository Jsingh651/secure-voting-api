name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (smoke test)
        run: docker build -t voting-app:ci .

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    # Dormant until you opt in: set repo variable DEPLOY_ENABLED=true and add
    # the EC2_* secrets. Only runs on push to main.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/secure-voting-api
            git pull origin main
            docker compose up -d --build
            docker image prune -f
