name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        env:
          JWT_SECRET: ci-test-secret
          SECRET_KEY: ci-test-secret
        run: pytest -q

  build:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (smoke test)
        run: docker build -t voting-app:ci .

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    # Stays dormant until you opt in: set repo variable DEPLOY_ENABLED=true and
    # add the EC2_* secrets (see DEPLOY.md). Only runs on push to main.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/secure-voting-api
            git pull origin main
            # Self-hosted stack: app + postgres on this instance.
            # Reads SECRET_KEY / JWT_SECRET / DB_PASSWORD from .env on the server.
            docker compose up -d --build
            docker image prune -f
