services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: ${DB_PASSWORD:-votingpass}
      POSTGRES_DB: votingdb
      TZ: America/Los_Angeles
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./flask_app/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voting -d votingdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: voting
      DB_PASSWORD: ${DB_PASSWORD:-votingpass}
      DB_NAME: votingdb
      DB_SSLMODE: disable
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      TZ: America/Los_Angeles
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
